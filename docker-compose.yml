services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pocketman_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
